<style>
/* base table styling */
table[name="join-project"] {
  border-collapse: separate;      /* allow spacing */
  border-spacing: 0 0.5rem;       /* horizontal & vertical cell gaps */
  width: 100%;
}

/* header underline */
table[name="join-project"] thead th {
  border-bottom: 2px solid #ccc;  /* thicker underline */
  padding: 0.5rem 1rem;
  text-align: left;
}

/* odd rows slightly darker background */
table[name="join-project"] tbody tr:nth-child(odd) {
  background-color: #e9ecef;      /* Bootstrap’s light gray */
}

/* hover effect: darker + pointer */
table[name="join-project"] tbody tr:hover {
  background-color: #d9dcdf;      /* slightly darker gray */
  cursor: pointer;
}

/* give cells a bit more breathing space */
table[name="join-project"] td {
  padding: 0.5rem 1rem;           /* increase left/right padding */
}
</style>

{% if projects|length %}
<table name="join-project" class="selectrow" class="m-3">
  <thead>
    <tr><th>Name</th><th>Creator</th><th>Description</th>
  </thead>
  <tbody>
  {% for project in projects %}
  <tr data-id="{{project.id}}">
    <td>{{ project.name }}</td>
    <td>{{ project.creator.profile.render_html }}</td>
    <td>{{ project.description }}</td>
  </tr>
  {% endfor %}
  </tbody>
</table>
{% else %}
<p class="m-3">There are no projects you can join right now</p> 
{% endif %}
