{# templates/tables/project_attach_toggle.html #}
{% comment %}record is the UserProjectBinding; record.project is the project{% endcomment %}
<input id="projecttoggler-{{ record.project.pk }}"
       name="attach-project"
       class="configtoggle"
       type="checkbox"
       data-toggle="toggle"
       data-size="{{ size|default:'small' }}"
       name="attach-project"
       data-on="<span class='bi bi-person-workspace'></span>"
       data-off="<span class='bi bi-person-video3'></span>"
       data-onstyle="success"
       data-offstyle="secondary"
       value="{{ record.project.pk }}">
