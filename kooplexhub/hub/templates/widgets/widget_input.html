<div data-type="text" data-title="{{tooltip}}" data-id="{{pk}}" data-field="{{field}}" data-orig="{{orig}}" data-instance="{{instance}}"
     class="editable fw-bold badge rounded-pill text-dark border border-2 border-dark text-start flex-grow-1 p-2 {{cls}}" data-placement="right">
  {% if orig %}
    {{orig|truncatechars:45}}
  {% else %}
    {{placeholder}}
  {% endif %}
</div>
