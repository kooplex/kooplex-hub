{% if containers|length %}
<table id="environmentControl">
    {% for container in containers %}
      <tr>
	  <td>{{ container.render_start_html }}</td>
          <td>{{ container.render_stop_html }}</td>
          <td>{{ container.render_open_html }}</td>
          <td>{{ container.render_name_html }}</td>
          <td>{{ container.render_state_html }}</td>
      </tr>
    {% endfor %}
</table>
{% else %}
<button id="environmentControl"  class="btn btn-secondary btn-sm rounded rounded-5 border border-2 border-dark mb-2" data-id="{{pk}}" data-autoadd="container">
    <i class="bi bi-boxes pe-1"></i>Generate default environment
</button>
{% endif %}
