{% load extras %}
{% load volume_tags %}
<div data-name="volumes" data-pk="{{pk}}" data-volumes="{{volumes|id_list}}" data-model="{{model}}">
    <div class="content">
      {% if volumes|length %}
        <table class="resourcetable">
	    <thead>
              <tr><th>Scope</th><th>Folder</th><th>Containers</th></tr>
	    </thead>
	    <tbody>
              {% for volume in volumes %}
                <tr>
                    <td>{% render_scope volume user %}</td>
                    <td>{{ volume.folder }}</td>
                    <td>{% render_usercontainers volume user %}</td>
                </tr>
              {% endfor %}
	    </tbody>
	</table>
      {% else %}
        <p>Click to add filesystem resources</p>
      {% endif %}
    </div>
</div>
