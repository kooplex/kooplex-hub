{% load report_buttons %}
{% load container_buttons %}






<style>
@media all and (max-width: 728.01px) {
  .imagesize{
    width: 200px;
    height: 200px;
  }
}

.goflex{
  display: flex;
}

.card:hover {
  cursor: pointer;
}

.btn-configure {
  width: 32px;
  height: 32px;
  padding: 0;
  background-color: #f0ad4e;  /* Bootstrap warning yellow-ish */
  color: #fff;
  border: none;
  border-radius: 4px;
}

.btn-configure:hover {
  background-color: #ec9a27;
  color: #fff;
}

</style>




{# FIXME: resize card #}
<div class="card mb-3 mx-1" style="max-width: 560px;" data-url="{% url 'report:open' report.id %}">
  <!-- Header -->
  <div class="card-header bg-secondary d-flex align-items-center">
    <span class="fw-semibold text-light">
      {{ report.name }}
    </span>

    {# float-right configure button #}
    <a href="{% url 'report:configure' report.id %}"
       class="btn btn-configure ms-auto d-flex align-items-center justify-content-center">
      <i class="bi bi-gear-fill"></i>
    </a>
  </div>

  <!-- Body -->
  <div class="card-body d-flex">
    <!-- Logo -->
    <div class="me-3">
      {% if report.thumbnail %}
        <img src="{{report.thumbnail.img_src}}" class="img-fluid imagesize rounded" alt="{{report.thumbnail.name}}">
      {% else %}
        <img src="/static/noimageavailable.png" class="img-fluid rounded imagesize" alt="no thumbnail">
      {% endif %}
    </div>

    <!-- Text content -->
    <div class="d-flex flex-column flex-grow-1">
      <p class="card-text small text-muted">
        {{ report.description|truncatechars:45 }}
      </p>

      <!-- Creator pinned to bottom -->
      <p class="card-text mt-auto mb-0">
        <small class="text-muted">
          <strong>Creator:</strong> {{ report.creator.profile.name }}
        </small>
      </p>
    </div>
  </div>
</div>
