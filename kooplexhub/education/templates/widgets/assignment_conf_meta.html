<label class="form-check-label align-top" for="name-{{assignment.id}}" id="lbl_anm-{{assignment.id}}" data-toggle="tooltip" title="Assignment's name"><i class="bi bi-card-heading"></i>&nbsp;</label>
<input class="form-text-input" type="text" id="name-{{assignment.id}}" data-instance="{{instance}}" data-field="name" data-id="{{assignment.id}}" data-orig="{{assignment.name}}" value="{{assignment.name}}" placeholder="Add an assignment name"/><br>
<label class="form-check-label align-top mt-2" for="description-{{assignment.id}}" id="lbl_dsc-{{assignment.id}}" data-toggle="tooltip" title="Assignment's description"><i class="bi bi-journal-richtext"></i>&nbsp;</label>
<textarea class="form-textarea mt-2" data-instance="{{instance}}" data-field="description" data-id="{{assignment.id}}" data-orig="{{assignment.description}}" placeholder="Provide a description">{{assignment.description}}</textarea>

<div>
  <!-- Tooltip Trigger -->

    Hover for Tooltip
  </button>
</div>

<script>
  // Initialize all tooltips
  const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
  const tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
    return new bootstrap.Tooltip(tooltipTriggerEl)
  })
</script>
