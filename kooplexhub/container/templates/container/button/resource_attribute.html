<span 
  data-model="container" data-pk="{{pk}}" data-name="{{attribute}}" data-value="{{value}}"
  {% if hidden %}class="d-none"{% endif %}
  >
  {% if caption %}
  <i class="{{icon}} me-1"></i><span class="me-2">{{caption}}</span>
  {% elif value %}
  <i class="{{icon}} me-1"></i><span class="me-2">{{value|truncatechars:6}} {{unit}}</span>
  {% endif %}
</span>
