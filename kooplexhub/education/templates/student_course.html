{% load django_tables2 %}


<div class="container py-5">
  <div class="outer-frame shadow-light">
    <ul class="nav nav-tabs" id="mainTabs-{{ course.id }}" role="tablist">
      <li class="nav-item" role="presentation">
        {# Tab button IDs are unique and used by aria-labelledby on the pane #}
        <button
          class="nav-link active"
          id="name-tab-{{ course.id }}"
          data-bs-toggle="tab"
          data-bs-target="#name-pane-{{ course.id }}"
          type="button"
          role="tab"
          aria-controls="name-pane-{{ course.id }}"
          aria-selected="true"
          data-bs-toggle="tooltip"  {# Bootstrap 5 tooltip attr #}
          title="Teachers: {{ course.teachers|join:", " }}"
        >
          {{ course.name }}
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="assignments-tab-{{ course.id }}"
          data-bs-toggle="tab"
          data-bs-target="#assignments-pane-{{ course.id }}"
          type="button"
          role="tab"
          aria-controls="assignments-pane-{{ course.id }}"
          aria-selected="false"
        >
          Assignments
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="environments-tab-{{ course.id }}"
          data-bs-toggle="tab"
          data-bs-target="#environments-pane-{{ course.id }}"
          data-id="{{ course.id }}"
          type="button"
          role="tab"
          aria-controls="environments-pane-{{ course.id }}"
          aria-selected="false"
        >
          Environments
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <div
        class="tab-pane fade show active"
        id="name-pane-{{ course.id }}"
        role="tabpanel"
        aria-labelledby="name-tab-{{ course.id }}"
      >
        <div class="inner-frame">
          <div class="card bg-transparent border-muted h-100">
            <div class="card-body">
              <p class="mb-3 text-secondary">{{ course.description }}</p>
              <p class="mb-3 text-secondary">
                Teacher{{ course.teachers|pluralize }}: {{ course.teachers|join:", " }}
              </p>
            </div>
          </div>
        </div>
      </div>

      <div
        class="tab-pane fade"
        id="assignments-pane-{{ course.id }}"
        role="tabpanel"
        aria-labelledby="assignments-tab-{{ course.id }}"
      >
        <div class="inner-frame">
          {% render_table t_assignments %}
        </div>
      </div>

      <div
        class="tab-pane fade"
        id="environments-pane-{{ course.id }}"
        role="tabpanel"
        aria-labelledby="environments-tab-{{ course.id }}"
      >
        <div class="inner-frame">
          <div id="environmentControl-{{ course.id }}" class="spinner-border" role="status"></div>
        </div>
      </div>
    </div>
  </div>
</div>
