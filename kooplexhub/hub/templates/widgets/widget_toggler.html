<input name="toggler" data-id="{{pk}}" data-mark="{{mark}}"
  type="checkbox" data-toggle="toggle" data-size="small"
  data-on="<span class='oi oi-lock-unlocked'></span>"
  data-off="<span class='oi oi-lock-locked'></span>"
  data-onstyle="success" data-offstyle="danger" value="{{pk}}" {% if is_toggled %}checked{% endif %}>
