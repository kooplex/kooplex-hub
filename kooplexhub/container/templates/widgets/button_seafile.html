<div id="container-seafile-{{container.id}}" class="me-2">
    <button class="badge rounded-pill border border-1 border-dark p-2 me-2 position-relative {% if container.start_seafile %}d-none{% endif %}" name="grant"
            data-toggle="tooltip" title="Enable seafile login"
            onclick="seafileButtonClick('{{container.id}}', 'True')">
      <img src="{{icon}}" width="15px" alt="t">
      <span class="position-absolute top-0 start-100 translate-middle badge bg-secondary small">off</span>
    </button>
    <button class="badge rounded-pill border border-2 border-success p-2 me-2 position-relative {% if not container.start_seafile %}d-none{% endif %}" name="revoke"
            data-toggle="tooltip" title="Disable seafile login"
            onclick="seafileButtonClick('{{container.id}}', 'False')">
      <img src="{{icon}}" width="15px" alt="t">
      <span class="position-absolute top-0 start-100 translate-middle badge bg-success small">on</span>
    </button>
</div>
