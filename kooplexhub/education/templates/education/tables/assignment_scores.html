{% extends 'django_table.html' %}

{% block tableextension %}
<template id="score-popover-template" data-id="{{course_id}}">
  <div class="p-2" style="width: 240px;">
    <div class="mb-2">
      <label class="form-label mb-1">Score</label>
      <input type="number" class="form-control form-control-sm js-score">
    </div>
    <div class="mb-2">
      <label class="form-label mb-1">Comment</label>
      <input type="text" class="form-control form-control-sm js-comment">
    </div>
    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-sm btn-secondary js-cancel">Cancel</button>
      <button type="button" class="btn btn-sm btn-primary js-save">Save</button>
    </div>
  </div>
</template>

<style>
    .popover { z-index: 1056; }
</style>
{% endblock %}
