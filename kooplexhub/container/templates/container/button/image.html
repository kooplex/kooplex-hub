<button
  type="button"
  class="badge rounded-pill border border-1 border-dark text-dark text-start p-2"
  title="Configure image"
  {% if disabled or not image_modal_url %}
    disabled
  {% else %}
    hx-get="{{ image_modal_url }}"
    hx-target="#modal-root"
    hx-swap="innerHTML"
  {% endif %}
>
  <i class="bi bi-card-image me-2"></i>
  {% if image %}
    {{ image.short_name }}
  {% else %}
    Select image
  {% endif %}
</button>
